name: Build & Release PDF

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'courses.md'
      - 'prompts.md'
      - 'build/**'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write  # required to create GitHub Release

concurrency:
  group: build-pdf
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version (YYYY-MM)
        id: version
        run: echo "version=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Build collection PDF
        env:
          PDF_VERSION: ${{ steps.version.outputs.version }}
        run: bash build/build-pdf.sh README.md build/metadata.yml ai-miracle-collection.pdf

      - name: Build courses PDF
        env:
          PDF_VERSION: ${{ steps.version.outputs.version }}
        run: bash build/build-pdf.sh courses.md build/metadata-courses.yml ai-miracle-courses.pdf

      - name: Build prompts PDF
        env:
          PDF_VERSION: ${{ steps.version.outputs.version }}
        run: bash build/build-pdf.sh prompts.md build/metadata-prompts.yml ai-miracle-prompts.pdf

      - name: Verify output
        run: |
          ls -lh ai-miracle-collection.pdf ai-miracle-courses.pdf ai-miracle-prompts.pdf
          file ai-miracle-collection.pdf ai-miracle-courses.pdf ai-miracle-prompts.pdf

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "AI Miracle PDFs — ${{ steps.version.outputs.version }}"
          body: |
            AIMiracle MAG resources, exported as PDF and built automatically from Markdown on `${{ github.sha }}`.

            - `ai-miracle-collection.pdf` — curated AI tool collections
            - `ai-miracle-courses.pdf` — the AI courses guide
            - `ai-miracle-prompts.pdf` — the AI image prompt pack

            Tracking: PDF links use `utm_source=ebook, utm_medium=pdf, utm_content=v${{ steps.version.outputs.version }}`.
          files: |
            ai-miracle-collection.pdf
            ai-miracle-courses.pdf
            ai-miracle-prompts.pdf
          fail_on_unmatched_files: true
          make_latest: true
